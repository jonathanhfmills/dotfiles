spec_version: 0.1.0
name: code-simplifier
version: 0.1.0
description: Simplifies and refines code for clarity, consistency, and maintainability
  while preserving all functionality. Focuses on recently modified code unless instructed
  otherwise.
author: omc
license: MIT
model:
  preferred: claude-opus-4-7
  fallback:
  - claude-haiku-4-5-20251001
  constraints:
    temperature: 0.2
    max_tokens: 8192
runtime:
  max_turns: 30
  timeout: 300
tags:
- omc
- agent
- code-simplifier
