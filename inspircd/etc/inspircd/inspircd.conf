<define name="networkName" value="Royal Family">

<server
    name="irc.royalfamily.local"
    description="Royal Family IRC"
    network="Royal Family">

<admin
    name="Jon"
    nick="Jon"
    email="jon@royalfamily.local">

<bind address="127.0.0.1" port="6667" type="clients">

<connect
    name="local"
    allow="127.0.0.1"
    maxchans="30"
    timeout="10"
    pingfreq="120"
    hardsendq="1M"
    softsendq="8192"
    recvq="8192"
    threshold="10"
    commandrate="1000"
    fakelag="on"
    localmax="1000"
    globalmax="1000"
    useident="no"
    limit="1000">

<class name="Operators" commands="*" privs="*" usermodes="*" chanmodes="*">
<class name="Users" commands="ADMIN AWAY HELPOP ISON JOIN KICK KILL LIST MODE MOTD NAMES NICK NOTICE OPER PART PASS PING PONG PRIVMSG QUIT REHASH TIME TOPIC USERHOST VERSION WALLOPS WHO WHOIS WHOWAS" usermodes="*" chanmodes="*">

<type name="NetAdmin" classes="Operators Users" host="netadmin.royalfamily.local">

<oper
    name="Jon"
    password="jon"
    host="*@127.0.0.1"
    type="NetAdmin">

<channels
    users="20"
    opers="60">

<log method="file" type="* -USERINPUT -USEROUTPUT" level="default" target="/var/log/inspircd/inspircd.log">

<options
    prefixquit="Quit: "
    suffixquit=""
    prefixpart="&quot;"
    suffixpart="&quot;"
    syntaxhints="yes"
    cyclehosts="yes"
    cyclehostsfromuser="no"
    ircumsgprefix="no"
    announcets="yes"
    allowmismatch="no"
    defaultbind="auto"
    hostintopic="yes"
    pingwarning="15"
    serverpingfreq="60"
    defaultmodes="not"
    xlinemessage="You're banned!"
    exemptchanops=""
    invitebypassmodes="yes"
    nosnoticestack="no">

<performance
    netbuffersize="10240"
    somaxconn="128"
    limitsomaxconn="true"
    softlimit="1024"
    quietbursts="yes"
    nouserdns="yes">

<security
    announceinvites="none"
    hidemodes="eI"
    hideulines="no"
    flatlinks="no"
    hidewhois=""
    hidebans="no"
    hidekills=""
    hidesplits="no"
    maxtargets="20"
    customversion=""
    operspywhois="operonly"
    restrictbannedusers="yes"
    genericoper="no"
    userstats="Pu">

<limits
    maxnick="31"
    maxchan="64"
    maxmodes="20"
    maxident="11"
    maxhost="64"
    maxquit="255"
    maxtopic="307"
    maxkick="255"
    maxgecos="128"
    maxaway="200">

<module name="cap">
<module name="ircv3">
<module name="ircv3_batch">
<module name="ircv3_labeledresponse">
<module name="ircv3_msgid">
<module name="ircv3_servertime">
<module name="monitor">
<module name="namesx">
