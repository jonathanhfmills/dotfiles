name: escalation
description: "6-tier confidence-based escalation — classifier → local → scorer → frontier"

# Full promotion chain: 0.8B → 4B → 9B → 35B-A3B (scorer) → 397B → Opus 4.6
#
# Local tiers (self-hosted SGLang, zero API cost):
#   Classifier: Qwen3.5-0.8B  (workstation CPU, cosmo:11435) — classification, formatting, routing
#   Medium:     Qwen3.5-4B    (workstation RTX 3080, cosmo:11434) — execution, logic, code
#   High:       Qwen3.5-9B    (NAS 9070 XT ROCm, wanda:11434) — orchestration, complex reasoning
#
# Scorer tier (self-hosted SGLang, zero API cost):
#   Scorer:     Qwen3.5-35B-A3B MoE (NAS CPU, wanda:11435) — reward/punishment scoring ONLY
#               Too slow for inference (~2-5 tok/s). Sole job: score trajectories for RL training.
#               Never used for task completion.
#
# OpenRouter tier (pay-per-token, knowledge distillation source):
#   Expert:     Qwen3.5-397B-A17B MoE (262K ctx) — hard problems, generates training data
#
# Break-glass (last resort):
#   Frontier:   Claude Opus 4.6 — when all Qwen tiers fail
#
# Distillation loop: frontier solutions are captured and used to fine-tune
# local weights (0.8B/4B/9B) via QLoRA + Atropos RL.

tiers:
  coding:
    machine: workstation
    local_model: Qwen/Qwen3.5-4B
    promotion_chain:
      - Qwen/Qwen3.5-0.8B              # classifier (workstation CPU, cosmo:11435)
      - Qwen/Qwen3.5-4B                # medium tier (workstation GPU, cosmo:11434)
      - Qwen/Qwen3.5-9B                # high tier (NAS GPU, wanda:11434)
      - Qwen/Qwen3.5-35B-A3B           # scorer (NAS CPU, wanda:11435) — reward only
      - qwen/qwen3.5-397b-a17b         # expert tier (OpenRouter, 262K ctx)
      - claude-opus                      # break-glass (Anthropic)
    agents: [cosmo, coder, deployer]
    max_attempts: 3
    on_escalation:
      - capture_to: escalation-log/coding/
      - update_memory: true
      - distill: true
      - description: "Solution captured for distillation → QLoRA fine-tuning"

  code_review:
    machine: workstation
    local_model: Qwen/Qwen3.5-4B
    promotion_chain:
      - Qwen/Qwen3.5-0.8B
      - Qwen/Qwen3.5-4B
      - Qwen/Qwen3.5-9B
      - Qwen/Qwen3.5-35B-A3B           # scorer — reward only
      - qwen/qwen3.5-397b-a17b
      - claude-opus
    agents: [reviewer]
    max_attempts: 3
    on_escalation:
      - capture_to: escalation-log/review/
      - update_memory: true
      - distill: true

  writing:
    machine: nas
    local_model: Qwen/Qwen3.5-9B
    promotion_chain:
      - Qwen/Qwen3.5-9B
      - Qwen/Qwen3.5-35B-A3B           # scorer — reward only
      - qwen/qwen3.5-397b-a17b
      - claude-opus
    agents: [writer]
    max_attempts: 3
    on_escalation:
      - capture_to: escalation-log/writing/
      - update_memory: true
      - distill: true

  research:
    machine: nas
    local_model: Qwen/Qwen3.5-9B
    promotion_chain:
      - Qwen/Qwen3.5-9B
      - Qwen/Qwen3.5-35B-A3B           # scorer — reward only
      - qwen/qwen3.5-397b-a17b
      - claude-opus
    agents: [reader]
    max_attempts: 3
    on_escalation:
      - capture_to: escalation-log/research/
      - update_memory: true
      - distill: true

# API keys injected via environment (agenix):
#   OPENROUTER_API_KEY — all external models (397B, Opus) via OpenRouter
#   OpenRouter has no-training guarantee — safe for all tiers
