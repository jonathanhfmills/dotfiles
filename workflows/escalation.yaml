name: escalation
description: "Tiered confidence-based escalation — local models first, frontier fallback"

# Promotion chain: 0.8B → 4B → 9B → Frontier (Claude Opus / Gemini 2.5 Pro)
# Each tier handles tasks at its confidence level. On failure or low confidence,
# the task promotes to the next tier. Frontier APIs are the last resort.
#
# Tier architecture:
#   Low:    Qwen3.5-0.8B (NAS CPU, wanda:11435)  — classification, formatting, routine
#   Medium: Qwen3.5-4B   (workstation RTX 3080)   — execution, logic, code
#   High:   Qwen3.5-9B   (NAS 9070 XT, wanda:11434) — orchestration, complex reasoning, QC
#   Frontier: Claude Opus / Gemini 2.5 Pro         — when local models can't solve it

tiers:
  coding:
    machine: workstation
    local_model: Qwen/Qwen3.5-4B
    promotion_chain:
      - Qwen/Qwen3.5-4B    # medium tier (workstation, cosmo:11434)
      - Qwen/Qwen3.5-9B    # high tier (NAS, wanda:11434)
      - claude-opus          # frontier
    agents: [cosmo, coder, deployer]
    max_attempts: 3
    on_escalation:
      - capture_to: escalation-log/coding/
      - update_memory: true
      - description: "Frontier solves it, solution saved to agent MEMORY.md"

  code_review:
    machine: workstation
    local_model: Qwen/Qwen3.5-4B
    promotion_chain:
      - Qwen/Qwen3.5-4B
      - Qwen/Qwen3.5-9B
      - claude-opus
    agents: [reviewer]
    max_attempts: 3
    on_escalation:
      - capture_to: escalation-log/review/
      - update_memory: true

  writing:
    machine: nas
    local_model: Qwen/Qwen3.5-9B
    promotion_chain:
      - Qwen/Qwen3.5-9B
      - gemini-2.5-pro
    agents: [writer]
    max_attempts: 3
    on_escalation:
      - capture_to: escalation-log/writing/
      - update_memory: true

  research:
    machine: nas
    local_model: Qwen/Qwen3.5-9B
    promotion_chain:
      - Qwen/Qwen3.5-9B
      - gemini-2.5-pro
    agents: [reader]
    max_attempts: 3
    on_escalation:
      - capture_to: escalation-log/research/
      - update_memory: true

# Frontier API keys are NOT in this file — injected via environment (agenix later)
# For now: ANTHROPIC_API_KEY, GOOGLE_API_KEY as env vars on each host
