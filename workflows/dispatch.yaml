name: dispatch
description: "Lobster routing — routes tasks by label to the correct queue and agent"

# OpenClaw reads task labels and writes queue files to the appropriate directory.
# Syncthing handles cross-machine delivery. The agent-runner on each host polls its queue.

routes:
  # Coding tasks → workstation (LangGraph auto: 4B → 9B local chain)
  - match: "code/*"
    queue: queue/workstation/
    lead: cosmo
    agents: [coder, reviewer, deployer]
    backend: langgraph
    execution_mode: auto
    description: "Code changes — local auto model selection"

  # Content tasks → NAS (LangGraph auto: 4B → 9B local chain)
  - match: "content/*"
    queue: queue/nas/
    lead: writer
    agents: [writer]
    backend: langgraph
    execution_mode: auto
    description: "Content — local auto model selection"

  # Research tasks → NAS (LangGraph auto: 4B → 9B local chain)
  - match: "research/*"
    queue: queue/nas/
    lead: reader
    agents: [reader]
    backend: langgraph
    execution_mode: auto
    description: "Research — local auto model selection"

  # Review tasks → workstation (LangGraph auto)
  - match: "review/*"
    queue: queue/workstation/
    lead: cosmo
    agents: [reviewer]
    backend: langgraph
    execution_mode: auto
    description: "Code review — local auto model selection"

  # Deploy tasks → workstation (LangGraph auto)
  - match: "deploy/*"
    queue: queue/workstation/
    lead: cosmo
    agents: [deployer]
    backend: langgraph
    execution_mode: auto
    description: "Deployment — local auto model selection"

  # Future routes (plumbed but not active until budget allows):
  # - match: "premium/*"
  #   execution_mode: claude-code   # Forced Claude CLI
  # - match: "seo/*"
  #   execution_mode: gemini        # Forced Gemini CLI

# Default: unmatched tasks stay in queue/nas/ for Wanda to triage
default:
  queue: queue/nas/
  backend: langgraph
  execution_mode: auto
  description: "Unmatched tasks — Wanda triages manually"
